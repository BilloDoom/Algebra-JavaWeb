<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Your Cart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h2>Your Cart</h2>

  <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}">
    <p>Your cart is empty.</p>
  </div>

  <div th:if="${cartItems != null and !#lists.isEmpty(cartItems)}">
    <form th:action="@{/cart/update}" method="post">
      <table class="table table-striped">
        <thead>
        <tr><th>Product</th><th>Quantity</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
          <td th:text="${item.product.name}">Product Name</td>
          <td>
            <input type="number" min="1" th:value="${item.quantity}"
                   th:name="'quantities[' + ${item.product.id} + ']'"
                   class="form-control form-control-sm" style="width: 80px;" />
          </td>
          <td>
            <form th:action="@{/cart/remove}" method="post" style="display:inline;">
              <input type="hidden" name="productId" th:value="${item.product.id}" />
              <button type="submit" class="btn btn-danger btn-sm">Remove</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
      <button type="submit" class="btn btn-primary">Update Cart</button>
    </form>

    <div class="mt-3">
      <strong>Total: </strong> <span id="total-amount" th:text="${total}">0.00</span> USD
    </div>

    <!-- PayPal Button -->
    <div id="paypal-button-container" class="mt-3"></div>
  </div>
</div>

<!-- Replace with your actual client ID -->
<script src="https://www.paypal.com/sdk/js?client-id=AQ2ByBtWUqWORMonUwblwgL-oEpaOvqvhn50n7l4MGT1YnPgo6KTimOqNXD8wV-gIxb-gKNsf_uuiTnE&currency=USD"></script>

<script>
  const total = document.getElementById("total-amount").innerText;

  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: total
          }
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Transaction completed by ' + details.payer.name.given_name + '!');
        window.location.href = '/order/success'; // You can change this
      });
    },
    onCancel: function(data) {
      alert('Payment was cancelled.');
    },
    onError: function(err) {
      console.error(err);
      alert('Something went wrong with the payment.');
    }
  }).render('#paypal-button-container');
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
