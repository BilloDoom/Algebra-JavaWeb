<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <title>Your Cart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h2>Your Cart</h2>
  <div th:if="${cart == null or #lists.isEmpty(cart)}">
    <p>Your cart is empty.</p>
  </div>
  <div th:if="${cart != null and !#lists.isEmpty(cart)}">
    <table class="table table-striped">
      <thead>
      <tr><th>Product</th><th>Quantity</th><th>Actions</th></tr>
      </thead>
      <tbody>
      <tr th:each="item : ${cart}">
        <td th:text="${item.name}">Product Name</td>
        <td th:text="${item.quantity}">1</td>
        <td>
          <form th:action="@{/cart/remove}" method="post" style="display:inline;">
            <input type="hidden" name="productId" th:value="${item.productId}" />
            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
    <a class="btn btn-success" th:href="@{/cart/checkout}">Proceed to Checkout</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
