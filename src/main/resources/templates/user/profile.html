<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>User Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
<div class="container mt-5">
  <h2>Your Profile</h2>
  <div>
    <p><strong>Username:</strong> <span th:text="${user.username}">username</span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}">email@example.com</span></p>
  </div>

  <h3>Your Orders</h3>
  <div th:if="${#lists.isEmpty(orders)}">
    <p>You have no orders yet.</p>
  </div>
  <div th:if="${!#lists.isEmpty(orders)}">
    <table class="table table-striped">
      <thead>
      <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Total Amount</th>
        <th>Shipping Address</th>
        <th>Items</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}">
        <td th:text="${order.id}">1</td>
        <td th:text="${order.status}">Status</td>
        <td th:text="${order.totalAmount}">0.00</td>
        <td th:text="${order.shippingAddress}">Address</td>
        <td>
          <ul>
            <li th:each="item : ${order.items}" th:text="${item.product.name + ' (x' + item.quantity + ')'}">Product</li>
          </ul>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <form th:action="@{/user/delete}" method="post"
        onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.')">
    <button type="submit" class="btn btn-danger">Delete My Account</button>
  </form>
</div>
</body>
</html>
