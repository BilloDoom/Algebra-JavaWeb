<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div th:replace="fragment/navbar :: navbar"></div>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4 shadow-sm text-center" style="width: 100%; max-width: 400px;">
        <h2 class="text-info mb-3" style="font-family: 'Orbitron', sans-serif;">Login</h2>

        <form th:action="@{/login}" method="post" class="needs-validation text-start">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required />
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required />
            </div>

            <div th:if="${param.error}" class="alert alert-danger text-center">
                Invalid username or password.
            </div>

            <button type="submit" class="btn btn-info w-100 text-white">Login</button>
        </form>

        <div class="mt-3">
            <span>Don't have an account?</span>
            <a th:href="@{/register}" class="text-info text-decoration-none">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
