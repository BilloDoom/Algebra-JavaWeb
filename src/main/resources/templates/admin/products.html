<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Manage Products</h2>
    <a th:href="@{/products/admin/edit/0}" class="btn btn-primary mb-3">Add Product</a>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Price</th><th>Category</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">Example</td>
            <td th:text="${product.price}">100</td>
            <td th:text="${product.category.name}">Category A</td>
            <td>
                <a th:href="@{'/products/admin/edit/' + ${product.id}}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="@{'/products/admin/delete/' + ${product.id}}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
