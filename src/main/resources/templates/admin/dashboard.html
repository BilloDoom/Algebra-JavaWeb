<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">
  <h1 class="text-center text-danger mb-4">Admin Panel</h1>

  <!-- Access restriction: Only show if user has ADMIN role -->
  <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">

    <div class="row">
      <!-- Products Management -->
      <div class="col-md-6">
        <h3>Manage Products</h3>

        <!-- Add Product -->
        <form th:action="@{/admin/products/add}" method="post" class="mb-3">
          <div class="mb-2">
            <input type="text" name="name" class="form-control" placeholder="Product Name" required>
          </div>
          <div class="mb-2">
            <input type="text" name="description" class="form-control" placeholder="Description">
          </div>
          <div class="mb-2">
            <input type="number" step="0.01" name="price" class="form-control" placeholder="Price" required>
          </div>
          <div class="mb-2">
            <input type="text" name="imageUrl" class="form-control" placeholder="Image URL">
          </div>
          <div class="mb-2">
            <select name="categoryId" class="form-select" required>
              <option value="">Select Category</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Sci-Fi</option>
            </select>
          </div>
          <button type="submit" class="btn btn-success">Add Product</button>
        </form>

        <!-- Existing Products -->
        <table class="table table-bordered">
          <thead>
          <tr>
            <th>Name</th><th>Price</th><th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="product : ${products}">
            <td th:text="${product.name}">Smartphone</td>
            <td th:text="${product.price}">699.99</td>
            <td>
              <a th:href="@{'/admin/products/edit/' + ${product.id}}" class="btn btn-sm btn-warning">Edit</a>
              <a th:href="@{'/admin/products/delete/' + ${product.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <!-- Category Management -->
      <div class="col-md-6">
        <h3>Manage Categories</h3>

        <!-- Add Category -->
        <form th:action="@{/admin/categories/add}" method="post" class="mb-3">
          <div class="mb-2">
            <input type="text" name="name" class="form-control" placeholder="Category Name" required>
          </div>
          <button type="submit" class="btn btn-primary">Add Category</button>
        </form>

        <!-- Existing Categories -->
        <table class="table table-bordered">
          <thead>
          <tr>
            <th>Name</th><th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="cat : ${categories}">
            <td th:text="${cat.name}">Books</td>
            <td>
              <a th:href="@{'/admin/categories/edit/' + ${cat.id}}" class="btn btn-sm btn-warning">Edit</a>
              <a th:href="@{'/admin/categories/delete/' + ${cat.id}}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Message if user is not admin -->
  <div th:if="${!#authorization.expression('hasRole(''ADMIN'')')}">
    <div class="alert alert-danger text-center">
      Access Denied: You must be an <strong>admin</strong> to access this page.
    </div>
  </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
