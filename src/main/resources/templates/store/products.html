<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div class="container product-container">
  <h1 class="text-center mb-4 text-info">The Outpost Market</h1>
  <div class="row">
    <div class="col-md-4" th:each="product : ${products}">
      <div class="product-card">
        <img th:src="@{${product.imageUrl}}" alt="Product Image" class="img-fluid product-image">
        <div class="product-title" th:text="${product.name}">Laser Lantern</div>
        <p th:text="${product.description}">A rustic light source powered by dark matter fuel cells.</p>
        <div class="product-price" th:text="'$' + ${product.price}">₡299.99</div>
        <a th:href="@{'/cart/add/' + ${product.id}}" class="btn btn-buy mt-2">Add to Cart</a>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
